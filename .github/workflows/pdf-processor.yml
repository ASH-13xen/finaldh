name: PDF Security Processor

on:
  workflow_dispatch:
    inputs:
      courseId:
        description: 'Course ID'
        required: true
        type: string
      userId:
        description: 'User ID'
        required: true
        type: string
      userName:
        description: 'User Name'
        required: true
        type: string
      userEmail:
        description: 'User Email'
        required: true
        type: string
      userMobile:
        description: 'User Mobile Number'
        required: true
        type: string
      sourceKey:
        description: 'Source PDF Key in R2'
        required: true
        type: string
      destinationKey:
        description: 'Destination PDF Key in R2'
        required: true
        type: string
      callbackUrl:
        description: 'Callback URL to report completion'
        required: true
        type: string

jobs:
  process-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          npm install @aws-sdk/client-s3 pdf-lib bwip-js @pdfsmaller/pdf-encrypt-lite axios

      - name: Run PDF Processor Script
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_ACCESS_KEY_ID }}
          CLOUDFLARE_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          CALLBACK_SECRET: ${{ secrets.CALLBACK_SECRET }}
        run: |
          node scripts/process-pdf.js \
            --courseId "${{ inputs.courseId }}" \
            --userId "${{ inputs.userId }}" \
            --userName "${{ inputs.userName }}" \
            --userEmail "${{ inputs.userEmail }}" \
            --userMobile "${{ inputs.userMobile }}" \
            --sourceKey "${{ inputs.sourceKey }}" \
            --destinationKey "${{ inputs.destinationKey }}" \
            --callbackUrl "${{ inputs.callbackUrl }}"
